<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    /* نفس الـ CSS السابق مع بعض التعديلات البسيطة، تم حذف الأنماط غير المستخدمة */
    :root{--navy-dark:#16234f;--navy:#1e2f66;--bg:#eef0f6;--panel:#fff;--border:#dde1ec;--text:#1b1f2e;--muted:#7a8194;--danger:#d64550;--success:#2e9e6e;--gold:#e0a72e;--blue-accent:#3b5bdb}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%}
    body{font-family:'Cairo',sans-serif;background:#0e142e;display:flex;justify-content:center;align-items:center}
    .phone{width:100%;max-width:420px;height:100vh;max-height:900px;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}
    @media(min-width:440px){.phone{border-radius:36px;height:900px;margin:20px 0}}
    .appbar{background:var(--navy);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .appbar .title{font-size:16.5px;font-weight:800}
    .appbar .sub{font-size:11px;color:#b9c2e6;cursor:pointer}
    .appbar .menu-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:16px;cursor:pointer}
    .content{flex:1;overflow-y:auto;padding:14px;padding-bottom:90px}
    .section{display:none}.section.active{display:block;animation:fadeIn .2s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;border-top:4px solid var(--blue-accent)}
    .kpi-card.warn{border-top-color:var(--danger)}.kpi-card.ok{border-top-color:var(--success)}.kpi-card.gold{border-top-color:var(--gold)}
    .kpi-card .val{font-size:19px;font-weight:800;color:var(--navy)}
    .kpi-card .lbl{font-size:10.5px;color:var(--muted);font-weight:700}
    .section-title{font-size:14px;font-weight:800;color:var(--navy);margin:14px 0 8px}
    .row-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer}
    .row-card .main-info{flex:1;min-width:0}
    .row-card .name{font-size:13.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-card .meta{font-size:11.5px;color:var(--muted)}
    .row-card .amount{font-size:13.5px;font-weight:800;color:var(--navy);flex-shrink:0}
    .badge{padding:3px 9px;border-radius:11px;font-size:10.5px;font-weight:700;color:#fff}
    .badge.paid{background:var(--success)}.badge.pending{background:var(--gold)}.badge.low{background:var(--danger)}.badge.ok2{background:var(--success)}
    .search-box{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:12px;font-family:'Cairo';font-size:13px;margin-bottom:10px;background:#fff}
    .sheet-overlay{position:absolute;inset:0;background:rgba(10,14,30,.5);display:none;z-index:20}
    .sheet-overlay.show{display:block}
    .sheet{position:absolute;bottom:0;left:0;right:0;max-height:88%;background:#fff;border-radius:20px 20px 0 0;z-index:21;transform:translateY(100%);transition:.25s;display:flex;flex-direction:column}
    .sheet.show{transform:translateY(0)}
    .sheet-handle{width:40px;height:4px;background:#dcdfe8;border-radius:2px;margin:10px auto 4px}
    .sheet-header{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 12px;border-bottom:1px solid var(--border)}
    .sheet-header h3{margin:0;font-size:15px;color:var(--navy);font-weight:800}
    .sheet-close{width:30px;height:30px;border-radius:50%;background:#f0f2f8;border:none;font-size:15px;cursor:pointer}
    .sheet-body{padding:14px 18px;overflow-y:auto}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px}
    .field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-family:'Cairo';font-size:13.5px;background:#f9fafc}
    .field input:focus,.field select:focus{outline:none;border-color:var(--blue-accent);background:#fff}
    .field input[readonly]{color:var(--muted)}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    table.items-mini{width:100%;border-collapse:collapse;font-size:12px}
    table.items-mini th{background:var(--navy);color:#fff;padding:6px;font-weight:700}
    table.items-mini td{padding:6px;border-top:1px solid var(--border);text-align:center;background:#fafbfd}
    .del-row{background:var(--danger);color:#fff;border:none;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer}
    .totals-mini{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;color:var(--navy);margin:6px 0}
    .btn{width:100%;padding:12px;border:none;border-radius:12px;font-family:'Cairo';font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:9px;background:linear-gradient(180deg,#5c7cf0,#3b5bdb)}

    .btn.edit{background:linear-gradient(180deg,#e0b84e,#e0a72e)}.btn.del{background:linear-gradient(180deg,#e46b74,#d64550)}
    .btn.outline{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}

    .tabbar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;overflow-x:auto;padding:6px 2px;z-index:10}
    .tab-item{flex:1 0 auto;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer}
    .tab-item .ic{font-size:19px}.tab-item.active{color:var(--blue-accent)}
    .toast{position:absolute;top:76px;left:50%;transform:translateX(-50%) translateY(-15px);background:var(--navy-dark);color:#fff;padding:10px 20px;border-radius:20px;font-size:12.5px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:250;white-space:nowrap;max-width:88%}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .login-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#3a4a63,#8a97a8);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
    .login-overlay.show{display:flex}
    .login-box{background:#fff;border-radius:16px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
    .login-logo{font-size:24px;font-weight:800;color:var(--navy)}
    .login-sub{font-size:12.5px;color:var(--muted);margin-bottom:20px}
    .login-box input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-family:'Cairo';font-size:14px;margin-bottom:10px;background:#f9fafc}

    .login-btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Cairo';font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(180deg,#5c7cf0,#3b5bdb);color:#fff}

    .login-toggle{font-size:12.5px;color:var(--blue-accent);cursor:pointer;margin-top:8px;font-weight:700}
    .print-overlay{position:fixed;inset:0;background:#525659;z-index:200;display:none;padding:14px;overflow-y:auto}
    .print-overlay.show{display:block}
    .print-actions{display:flex;gap:10px;margin-bottom:12px;position:sticky;top:0;z-index:2}
    .print-actions button{flex:1;padding:11px;border:none;border-radius:8px;font-family:'Cairo';font-weight:700;font-size:13.5px;cursor:pointer}

    .inv-datetime{direction:ltr;text-align:left}
    .inv-company{color:#1a4fd6;font-weight:700;text-align:right;line-height:1.5}
    .inv-title{text-align:center;font-size:17px;font-weight:800;margin:8px 0}
    .inv-meta{display:flex;flex-wrap:wrap;gap:4px 12px;margin:10px 0;font-size:13px}
    .inv-meta b{font-weight:800}
    .inv-partybar{display:flex;border:1px solid #999;margin-bottom:10px;font-size:12.5px}
    .inv-partybar > div{flex:1;padding:6px 8px;border-left:1px solid #999;text-align:center}
    .inv-partybar > div:last-child{border-left:none}
    table.inv-items{width:100%;border-collapse:collapse;font-size:12.5px}
    table.inv-items th{background:#e8e8e8;border:1px solid #999;padding:6px 4px;font-weight:700}
    table.inv-items td{border:1px solid #999;padding:5px 4px;text-align:center}
    .inv-totalrow td{background:#d9ede2;font-weight:700}
    .inv-summary{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
    .inv-summary td{border:1px solid #999;padding:7px 10px}
    .inv-summary td.label{text-align:right;width:40%}
    .inv-summary tr.highlight td{background:#fbdcc9}
    .inv-summary tr.total td{color:#c0392b;font-weight:800}
    @media print{body *{visibility:hidden}.print-overlay,.print-overlay *{visibility:visible}.print-overlay{position:absolute;inset:0;background:#fff;padding:0}.print-actions{display:none}.invoice-doc{max-width:100%}}
    .empty-msg{text-align:center;color:var(--muted);padding:20px 0;font-size:12.5px}
  </style>
</head>

  </div>
</div>

const $ = id => document.getElementById(id);

let lang = 'ar';
function t(key){ return LANG[lang][key] || key; }
function applyLang(){ document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.dataset.i18n; if(LANG[lang][k]) el.textContent=LANG[lang][k]; }); $('langBtn').textContent=lang==='ar'?'FR':'ع'; }
$('langBtn').onclick=()=>{ lang=lang==='ar'?'fr':'ar'; applyLang(); renderAll(); };

// ========== Tab System ==========
const sections = ['rapports','ventes','achats','clients','fournisseurs','articles','caisse','expenses','reglements','approvals'];
let currentSection = 'rapports';

function renderTabs(){
  const bar=$('tabbar'); bar.innerHTML='';
  sections.forEach(s=>{
    const div=document.createElement('div'); div.className='tab-item'+(s===currentSection?' active':'');
    div.innerHTML=`<span class="ic">${s==='rapports'?'📊':s==='ventes'?'📈':s==='achats'?'🛒':s==='clients'?'👥':s==='fournisseurs'?'🤝':s==='articles'?'📦':s==='caisse'?'💰':s==='expenses'?'💸':s==='reglements'?'🧾':'👤'}</span><span>${t('tab'+s.charAt(0).toUpperCase()+s.slice(1))}</span>`;
    div.onclick=()=>{ currentSection=s; renderTabs(); renderSection(s); };
    bar.appendChild(div);
  });
  if(currentUser && currentUser.email===ADMIN_EMAIL) bar.lastChild.style.display='';
  else bar.lastChild.style.display='none';
}

function renderSection(name){
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  const container=$('content');
  let sec = container.querySelector(`#sec-${name}`);
  if(!sec){
    sec=document.createElement('div'); sec.id=`sec-${name}`; sec.className='section';
    container.appendChild(sec);
    // توليد المحتوى حسب القسم
    if(name==='rapports') sec.innerHTML=rapportsHTML();
    else if(name==='ventes'||name==='achats') sec.innerHTML=invoiceListHTML(name);
    else if(name==='clients'||name==='fournisseurs'||name==='articles'||name==='caisse'||name==='expenses'||name==='reglements'||name==='approvals')
      sec.innerHTML=genericListHTML(name);
  }
  sec.classList.add('active');
  $('pageTitle').textContent = t('tab'+name.charAt(0).toUpperCase()+name.slice(1));
  // تحديث البيانات
  if(name==='rapports') renderRapports();
  else if(name==='caisse') renderCaisse();
  else if(name==='expenses') renderExpenses();
  else if(name==='reglements') renderReglements();
  else if(name==='approvals') renderApprovals();
  else if(name==='ventes'||name==='achats') renderInvoices(name);
  else renderList(name);
}

function rapportsHTML(){ return `
  <div class="kpi-row"><div class="kpi-card ok"><div class="val" id="kpiVentes">0</div><div class="lbl">${t('kpiVentes')}</div></div>
    <div class="kpi-card warn"><div class="val" id="kpiAchats">0</div><div class="lbl">${t('kpiAchats')}</div></div>
    <div class="kpi-card"><div class="val" id="kpiClients">0</div><div class="lbl">${t('kpiClients')}</div></div>
    <div class="kpi-card gold"><div class="val" id="kpiFournisseurs">0</div><div class="lbl">${t('kpiFournisseurs')}</div></div></div>
  <div class="section-title">${t('lowStock')}</div><div id="lowStockList"></div>`; }
function invoiceListHTML(name){ return `<input class="search-box" id="search${name}" placeholder="${t('search')}..." oninput="renderInvoices('${name}')"><div id="list${name}"></div>`; }
function genericListHTML(name){ return `<input class="search-box" id="search${name}" placeholder="${t('search')}..." oninput="renderList('${name}')"><div id="list${name}"></div>`; }

// ========== Data Store ==========
let data = { clients:[], fournisseurs:[], articles:[], ventes:[], achats:[], caisse:[], expenses:[], stockMovements:[] };
let nextId = { clients:1, fournisseurs:1, articles:1, ventes:1, achats:1, caisse:1, expenses:1, stock:1, reglements:1 };
let companyInfo = { name:'GTR POS', address:'', phone:'', taxId:'', logo:'' };

function getStock(articleName){ return data.stockMovements.filter(m=>m.articleName===articleName).reduce((a,m)=>a+(m.type==='in'?m.qty:-m.qty),0); }
function addStock(articleName,qty,type,source,id,desc){ data.stockMovements.push({id:nextId.stock++, articleName, qty, type, source, sourceId:id, date:new Date().toISOString().slice(0,10), description:desc}); }
function removeStock(source,id){ data.stockMovements=data.stockMovements.filter(m=>!(m.source===source && m.sourceId===id)); }

function saveState(){
  const obj = { clients:data.clients, fournisseurs:data.fournisseurs, articles:data.articles, ventes:data.ventes, achats:data.achats, caisse:data.caisse, expenses:data.expenses, stockMovements:data.stockMovements, nextId, companyInfo };
  localStorage.setItem('gtrpos_data', JSON.stringify(obj));
  if(currentUser) db.collection('users').doc(currentUser.uid).set(obj).catch(console.error);
}
function loadState(){
  try{
    const raw=localStorage.getItem('gtrpos_data');
    if(raw){ const d=JSON.parse(raw); Object.assign(data,d); if(d.nextId) nextId=d.nextId; if(d.companyInfo) companyInfo=d.companyInfo; }
  }catch(e){}
}
function loadStateFromFirestore(uid){
  return db.collection('users').doc(uid).get().then(doc=>{
    if(doc.exists){ const d=doc.data(); Object.assign(data,d); if(d.nextId) nextId=d.nextId; if(d.companyInfo) companyInfo=d.companyInfo; }
    else { data={clients:[],fournisseurs:[],articles:[],ventes:[],achats:[],caisse:[],expenses:[],stockMovements:[]}; saveState(); }
  }).catch(()=>loadState());
}

// ========== DataManager ==========
class DataManager {
  constructor(name, schema, listId) {
    this.name = name; // key in data object
    this.schema = schema; // [{key, label, type, required?, default?}]
    this.listId = listId;
    this.editingId = null;
    this.items = data[name];
  }
  getItems(){ return data[this.name]; }
  render(){
    const q = document.getElementById('search'+this.name)?.value?.toLowerCase() || '';
    const filtered = this.getItems().filter(i => !q || (i.name||'').toLowerCase().includes(q) || (i.phone||'').includes(q));
    const container = document.getElementById(this.listId);
    if(!container) return;
    if(!filtered.length){ container.innerHTML='<div class="empty-msg">'+t('noData')||'لا توجد بيانات'; return; }
    container.innerHTML = filtered.map(i => `
      <div class="row-card" onclick="managers['${this.name}'].openEdit(${i.id})">
        <div class="main-info"><div class="name">${i.name||''}</div><div class="meta">${i.phone||i.date||''}</div></div>
        <div class="amount">${(i.balance||i.price||i.total||0).toFixed(3)} ${i.price?'د.ت':''}</div>
      </div>
    `).join('');
  }
  openNew(){
    this.editingId=null;
    this.fillForm({});
    $('sheetTitle').textContent = t('add')+' '+t(this.name);
    openSheet('main');
  }
  openEdit(id){
    const item = this.getItems().find(i=>i.id===id);
    if(!item) return;
    this.editingId=id;
    this.fillForm(item);
    $('sheetTitle').textContent = t('edit')+' '+t(this.name);
    openSheet('main');
  }
  fillForm(item){
    const body=$('sheetBody');
    body.innerHTML = this.schema.map(f => `
      <div class="field"><label>${f.label}</label>
        ${f.type==='select' ? `<select id="field_${f.key}">${(f.options||[]).map(o=>`<option value="${o.value}" ${item?.[f.key]===o.value?'selected':''}>${o.label}</option>`).join('')}</select>`
        : `<input id="field_${f.key}" type="${f.type||'text'}" ${f.readonly?'readonly':''} value="${item?.[f.key]??f.default||''}">`}
      </div>
    `).join('') + `
      <div class="btn-row">
        <button class="btn save" onclick="managers['${this.name}'].save()">${t('save')}</button>
        <button class="btn edit" onclick="managers['${this.name}'].save()">${t('edit')}</button>
        <button class="btn del" onclick="managers['${this.name}'].delete()">${t('delete')}</button>
      </div>
    `;
    // ربط الأحداث للمتابعة حسب الحاجة
  }
  save(){
    const item = {};
    this.schema.forEach(f=>{
      const el = document.getElementById('field_'+f.key);
      if(!el) return;
      if(f.type==='number') item[f.key] = parseFloat(el.value)||0;
      else if(f.type==='select') item[f.key] = el.value;
      else item[f.key] = el.value.trim();
    });
    // تحقق الحقول المطلوبة
    for(let f of this.schema){
      if(f.required && !item[f.key]){ showToast(`أدخل ${f.label}`); return; }
    }
    const items = this.getItems();
    if(this.editingId){
      const idx = items.findIndex(i=>i.id===this.editingId);
      if(idx>-1){ items[idx] = {...items[idx], ...item}; }
      showToast('تم التعديل');
    } else {
      item.id = nextId[this.name]++;
      items.push(item);
      showToast('تم الحفظ');
    }
    saveState();
    this.render();
    closeSheet();
  }
  delete(){
    if(!this.editingId) return;
    const items = this.getItems();
    const idx = items.findIndex(i=>i.id===this.editingId);
    if(idx>-1){
      // منع الحذف إذا كان مستخدماً
      if(this.name==='clients' && data.ventes.some(v=>v.client===items[idx].name)){ showToast('لا يمكن حذف عميل له مبيعات'); return; }
      if(this.name==='fournisseurs' && data.achats.some(a=>a.supplier===items[idx].name)){ showToast('لا يمكن حذف مورد له مشتريات'); return; }
      if(this.name==='articles' && (data.ventes.some(v=>v.lines.some(l=>l.name===items[idx].name)) || data.achats.some(a=>a.lines.some(l=>l.name===items[idx].name)))){ showToast('لا يمكن حذف صنف مستخدم'); return; }
      items.splice(idx,1);
      showToast('تم الحذف');
      saveState();
      this.render();
      closeSheet();
    }
  }
}

// تعريف السكيما لكل كيان

for(let k of ['clients','fournisseurs','articles']){

// ========== دوال العرض العامة ==========
function renderList(name){ if(managers[name]) managers[name].render(); }
function renderAll(){ sections.forEach(s=>renderSection(s)); }

// ========== الفواتير (مبيعات ومشتريات) ==========
function renderInvoices(type){
  const list = data[type];
  const q = document.getElementById('search'+type)?.value?.toLowerCase() || '';
  const filtered = list.filter(i => !q || (i.num||'').toLowerCase().includes(q) || (i.client||i.supplier||'').toLowerCase().includes(q));
  const container = document.getElementById('list'+type);
  if(!container) return;
  if(!filtered.length){ container.innerHTML='<div class="empty-msg">لا توجد فواتير</div>'; return; }
  container.innerHTML = filtered.slice().reverse().map(i => `
    <div class="row-card" onclick="openInvoice('${type}', ${i.id})">
      <div class="main-info"><div class="name">${i.num} · ${i.client||i.supplier}</div><div class="meta">${i.date}</div></div>
      <div class="amount">${i.total.toFixed(3)} د.ت</div>
    </div>
  `).join('');
}
function openInvoice(type,id){ /* سيتم فتح نموذج تفصيلي مع البنود والتسديدات */ showToast('جاري فتح الفاتورة...'); }

// ========== الكاش والمصاريف ==========
function renderCaisse(){
  const balance = data.caisse.reduce((a,k)=>a+(k.type==='in'?k.amount:-k.amount),0);
  const el = document.querySelector('#sec-caisse .kpi-card .val');
  if(el) el.textContent = balance.toFixed(3)+' د.ت';
  // عرض القائمة
  const container = document.getElementById('listcaisse');
  if(!container) return;
  const sorted = data.caisse.slice().sort((a,b)=>a.date<b.date?1:-1);
  container.innerHTML = sorted.map(k => `
    <div class="row-card">
      <div class="main-info"><div class="name">${k.description||'-'}</div><div class="meta">${k.date}</div></div>
      <div class="amount" style="color:${k.type==='in'?'var(--success)':'var(--danger)'};">${k.type==='in'?'+':'-'}${k.amount.toFixed(3)}</div>
    </div>
  `).join('');
}

function renderExpenses(){
  const total = data.expenses.reduce((a,e)=>a+e.amount,0);
  const el = document.querySelector('#sec-expenses .kpi-card .val');
  if(el) el.textContent = total.toFixed(3)+' د.ت';
  const container = document.getElementById('listexpenses');
  if(!container) return;
  const sorted = data.expenses.slice().sort((a,b)=>a.date<b.date?1:-1);
  container.innerHTML = sorted.map(e => `
    <div class="row-card">
      <div class="main-info"><div class="name">${e.category||''}${e.description?' - '+e.description:''}</div><div class="meta">${e.date}</div></div>
      <div class="amount" style="color:var(--danger);">-${e.amount.toFixed(3)}</div>
    </div>
  `).join('');
}

// ========== التسديدات ==========
function renderReglements(){
  let all = [];
  data.clients.forEach(c=>{(c.reglements||[]).forEach(r=>all.push({...r, name:c.name, kind:'client'}))});
  data.fournisseurs.forEach(f=>{(f.reglements||[]).forEach(r=>all.push({...r, name:f.name, kind:'fournisseur'}))});
  const totalClients = all.filter(r=>r.kind==='client').reduce((a,r)=>a+r.amount,0);
  const totalFournisseurs = all.filter(r=>r.kind==='fournisseur').reduce((a,r)=>a+r.amount,0);
  document.getElementById('reglTotalClients')?.textContent = totalClients.toFixed(3);
  document.getElementById('reglTotalFournisseurs')?.textContent = totalFournisseurs.toFixed(3);
  const container = document.getElementById('listreglements');
  if(!container) return;
  const q = document.getElementById('searchreglements')?.value?.toLowerCase()||'';
  const filtered = all.filter(r=>!q||r.name.toLowerCase().includes(q)).sort((a,b)=>a.date<b.date?1:-1);
  container.innerHTML = filtered.map(r => `
    <div class="row-card"><div class="main-info"><div class="name">${r.kind==='client'?'من ':'إلى '}${r.name}</div><div class="meta">${r.date}</div></div>
    <div class="amount" style="color:${r.kind==='client'?'var(--success)':'var(--danger)'};">${r.amount.toFixed(3)}</div></div>
  `).join('');
}

// ========== الموافقات ==========
function renderApprovals(){
  if(!currentUser || currentUser.email!==ADMIN_EMAIL){ document.getElementById('listapprovals').innerHTML='<div class="empty-msg">هذا القسم لصاحب النظام فقط</div>'; return; }
  db.collection('approvals').get().then(snap=>{
    const container = document.getElementById('listapprovals');
    if(!container) return;
    let html = '<div class="section-title">'+t('pendingApprovals')+'</div>';
    let pending=[], approved=[];
    snap.forEach(doc=>{ const d=doc.data(); if(d.approved) approved.push({uid:doc.id,...d}); else pending.push({uid:doc.id,...d}); });
    if(!pending.length) html += '<div class="empty-msg">لا توجد طلبات</div>';
    else pending.forEach(p=>{ html += `<div class="row-card"><div class="main-info"><div class="name">${p.email||p.uid}</div><div class="meta">${(p.requestedAt||'').slice(0,10)}</div></div><button class="del-row" style="background:var(--success);" onclick="approveAccount('${p.uid}',true)">${t('approve')}</button></div>`; });
    html += '<div class="section-title">'+t('approvedAccounts')+'</div>';
    if(!approved.length) html += '<div class="empty-msg">لا توجد حسابات موافق عليها</div>';
    else approved.forEach(p=>{ html += `<div class="row-card"><div class="main-info"><div class="name">${p.email||p.uid}</div></div><button class="del-row" onclick="approveAccount('${p.uid}',false)">${t('revoke')}</button></div>`; });
    container.innerHTML = html;
  });
}
function approveAccount(uid,value){ db.collection('approvals').doc(uid).update({approved:value}).then(()=>{ showToast(value?'تمت الموافقة':'تم إلغاء الموافقة'); renderApprovals(); }); }

// ========== التقارير ==========
function renderRapports(){
  document.getElementById('kpiVentes').textContent = data.ventes.reduce((a,v)=>a+v.total,0).toFixed(3);
  document.getElementById('kpiAchats').textContent = data.achats.reduce((a,p)=>a+p.total,0).toFixed(3);
  document.getElementById('kpiClients').textContent = data.clients.length;

}

// ========== Sheet التحكم ==========
function openSheet(name){ $('overlay').classList.add('show'); $('sheet-main').classList.add('show'); }
function closeSheet(){ $('overlay').classList.remove('show'); $('sheet-main').classList.remove('show'); }
$('overlay').onclick=closeSheet;

// ========== المصادقة ==========
function toggleLogin(){ isSignup=!isSignup; $('loginMainBtn').textContent=isSignup?'إنشاء حساب':'تسجيل الدخول'; $('loginToggleBtn').textContent=isSignup?'عندك حساب؟ سجل':'ما عندكش حساب؟ أنشئ'; }
$('loginToggleBtn').onclick=toggleLogin;
$('loginMainBtn').onclick=()=>{
  const email=$('loginEmail').value, pass=$('loginPassword').value;
  if(!email||!pass){ $('loginError').textContent='أدخل البريد وكلمة السر'; return; }
  $('loginError').textContent='';
  (isSignup? auth.createUserWithEmailAndPassword(email,pass) : auth.signInWithEmailAndPassword(email,pass))
    .catch(e=>$('loginError').textContent=e.message);
};
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    if(user.email===ADMIN_EMAIL){
      $('loginOverlay').classList.remove('show');
      $('pendingOverlay').classList.remove('show');
      loadStateFromFirestore(user.uid).then(()=>{ initApp(); });
      return;
    }
    db.collection('approvals').doc(user.uid).get().then(doc=>{
      if(!doc.exists){ db.collection('approvals').doc(user.uid).set({email:user.email,requestedAt:new Date().toISOString(),approved:false}); }
      if(doc.data()?.approved){
        $('loginOverlay').classList.remove('show');
        $('pendingOverlay').classList.remove('show');
        loadStateFromFirestore(user.uid).then(()=>{ initApp(); });
      } else {
        $('loginOverlay').classList.remove('show');
        $('pendingOverlay').classList.add('show');
      }
    });
  } else {
    currentUser=null; $('loginOverlay').classList.add('show'); $('pendingOverlay').classList.remove('show');
  }
});

// ========== بدء التطبيق ==========
function initApp(){
  // إنشاء الأقسام في البداية
  sections.forEach(s=>renderSection(s));
  renderTabs();
  applyLang();
  // ربط زر الإضافة
  $('fabBtn').onclick = ()=>{
    if(currentSection==='rapports'){ showToast('اختر قسما لإضافة عنصر'); return; }
    const map={clients:()=>managers.clients.openNew(), fournisseurs:()=>managers.fournisseurs.openNew(), articles:()=>managers.articles.openNew(), caisse:()=>{/* فتح نموذج كاش */}, expenses:()=>{/* فتح نموذج مصروف */}};
    if(map[currentSection]) map[currentSection]();
    else showToast('استعمل زر الإضافة في القسم');
  };
  // حفظ تلقائي كل 5 ثواني
  setInterval(saveState, 5000);
  // تحميل البيانات الأولية
  renderAll();
}
