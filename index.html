<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشير إبتكار ويب</title>
    <!-- مكتبة الأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خط عربي حديث -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f4f7fc;
            padding-bottom: 20px;
            position: relative;
        }

        /* --- الهيدر (الشريط العلوي) --- */
        .app-header {
            background-color: #0f3d48;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .app-header h2 { font-size: 18px; font-weight: 700; margin: 0; }
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .header-icons i { font-size: 20px; cursor: pointer; }
        .profile-icon { background-color: rgba(255,255,255,0.2); border-radius: 50%; padding: 8px; }

        /* --- الأزرار الثلاثة العلوية --- */
        .main-actions {
            display: flex;
            justify-content: space-around;
            padding: 20px 15px;
            gap: 10px;
        }
        .action-card {
            background: white; border-radius: 16px; padding: 15px 0; flex: 1;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02); border: 1px solid #f0f0f0;
        }
        .action-card .icon-box {
            background-color: #fff3e6; width: 50px; height: 50px; border-radius: 14px;
            display: flex; justify-content: center; align-items: center; margin-bottom: 8px;
        }
        .action-card .icon-box i { color: #ed9b4a; font-size: 24px; }
        .action-card span { color: #0f3d48; font-weight: 700; font-size: 15px; }

        /* --- شبكة القائمة الرئيسية --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 0 15px 20px 15px;
        }
        .grid-item {
            background: white; border-radius: 16px; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #f0f0f0;
            cursor: pointer; transition: transform 0.2s;
        }
        .grid-item:active { transform: scale(0.98); }
        .grid-item .icon-box {
            background-color: #e3ecf2; width: 55px; height: 55px; border-radius: 16px;
            display: flex; justify-content: center; align-items: center; margin-bottom: 12px;
        }
        .grid-item .icon-box i { color: #2d6a7a; font-size: 26px; }
        .grid-item span { color: #0f3d48; font-weight: 700; font-size: 14px; text-align: center; }
        .divider { height: 1px; background-color: #ddd; margin: 5px 15px 15px 15px; opacity: 0.5; }

        /* --- نافذة المصروفات (Sheet) --- */
        .sheet-overlay {
            display: none; /* مخفي افتراضياً */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .sheet {
            background: white; width: 90%; max-width: 400px; border-radius: 20px;
            padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .sheet-header h3 { margin: 0; color: #0f3d48; font-size: 20px; }
        .sheet-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        
        .field { margin-bottom: 15px; display: flex; flex-direction: column; }
        .field label { font-weight: 600; font-size: 14px; color: #333; margin-bottom: 5px; }
        .field input, .field select {
            padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: 'Cairo', sans-serif;
        }
        .field input:focus, .field select:focus { outline: 2px solid #2d6a7a; border-color: transparent; }
        
        .sheet-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 14px; }
        .btn.save { background-color: #0f3d48; color: white; }
        .btn.edit { background-color: #ed9b4a; color: white; }
        .btn.del { background-color: #d9534f; color: white; }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header class="app-header">
        <div class="header-icons"><i class="fas fa-arrow-right-from-bracket"></i></div>
        <h2>كاشير إبتكار ويب</h2>
        <div class="header-icons"><div class="profile-icon"><i class="fas fa-user"></i></div></div>
    </header>

    <!-- الأزرار العلوية -->
    <div class="main-actions">
        <div class="action-card"><div class="icon-box"><i class="fas fa-file-invoice"></i></div><span>سند</span></div>
        <div class="action-card"><div class="icon-box"><i class="fas fa-cart-shopping"></i></div><span>شراء</span></div>
        <div class="action-card"><div class="icon-box"><i class="fas fa-cash-register"></i></div><span>بيع</span></div>
    </div>

    <div class="divider"></div>

    <!-- شبكة القائمة (نفس أسماء الصورة) -->
    <div class="dashboard-grid">
        <div class="grid-item"><div class="icon-box"><i class="fas fa-users"></i></div><span>العملاء</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-chart-simple"></i></div><span>المبيعات</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-box-open"></i></div><span>المخزون</span></div>

        <div class="grid-item"><div class="icon-box"><i class="fas fa-file-lines"></i></div><span>السندات</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-briefcase"></i></div><span>المشتريات</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-building"></i></div><span>الموردين</span></div>

        <div class="grid-item"><div class="icon-box"><i class="fas fa-chart-column"></i></div><span>التقارير</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-calendar-check"></i></div><span>إغلاق الفترة</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-user-gear"></i></div><span>المستخدمين</span></div>

        <div class="grid-item"><div class="icon-box"><i class="fas fa-th-large"></i></div><span>لوحة التحكم</span></div>
        <div class="grid-item"><div class="icon-box"><i class="fas fa-gear"></i></div><span>إعدادات</span></div>
        
        <!-- زر المصروفات (الذي يفتح النافذة) -->
        <div class="grid-item" onclick="openExpenses()">
            <div class="icon-box"><i class="fas fa-money-bill-wave"></i></div>
            <span>المصروفات</span>
        </div>
    </div>

    <!-- ====== نافذة المصروفات (كما طلبت في البداية) ====== -->
    <div class="sheet-overlay" id="sheetOverlay">
        <div class="sheet" id="sheet-expenses">
            <div class="sheet-header">
                <h3>مصروف</h3>
                <button class="sheet-close" onclick="closeSheet()">✕</button>
            </div>
            <div class="sheet-body">
                <div class="field"><label>رقم المصروف</label><input id="exCode" readonly value="EXP-001"></div>
                <div class="field"><label>التاريخ</label><input id="exDate" type="date"></div>
                <div class="field">
                    <label>الفئة</label>
                    <select id="exCategory">
                        <option>كراء</option><option>أجور</option><option>فواتير</option><option>نقل</option><option>صيانة</option><option>أخرى</option>
                    </select>
                </div>
                <div class="field"><label>المبلغ (د.ت)</label><input id="exAmount" type="number" step="0.001"></div>
                <div class="field"><label>البيان</label><input id="exDesc"></div>
            </div>
            <div class="sheet-footer">
                <button class="btn save" onclick="alert('تم الحفظ!')">💾 حفظ</button>
                <button class="btn edit" onclick="alert('تعديل')">✏️ تعديل</button>
                <button class="btn del" onclick="alert('حذف')">🗑 حذف</button>
            </div>
        </div>
    </div>

    <!-- السكربت الخاص بفتح وإغلاق النافذة -->
    <script>
        function openExpenses() {
            document.getElementById('sheetOverlay').style.display = 'flex';
        }
        function closeSheet() {
            document.getElementById('sheetOverlay').style.display = 'none';
        }
        // إغلاق النافذة عند النقر خارجها
        document.getElementById('sheetOverlay').addEventListener('click', function(e) {
            if (e.target === this) { closeSheet(); }
        });
    </script>

</body>
</html>
